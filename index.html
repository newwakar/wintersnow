<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magical Winter - Interactive</title>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.1.3/css/bootstrap.min.css'>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="background-linear"></div>

    <!-- Popup Container -->
    <div id="custom-popup" class="popup-overlay">
        <div class="popup-content">
            <p id="popup-text"></p>
            <button onclick="closePopup()">Close</button>
        </div>
    </div>

    <div class="wrapper">
        <div class="winter-wrapper">
            <!-- Snow Layers (omitted for brevity, keep your original spans) -->
            <div class="winter-wrap">
                <div class="sun"></div>
                <div class="bottom-snow"><span></span></div>
                <div class="middle-snow"></div>
                
                <!-- Buildings (keep your original spans) -->

                <!-- Interactive Left Tree -->
                <div class="tree" id="tree-left" onclick="showPopup('Male Name: John Doe')">
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                </div>

                <!-- Interactive Right Tree -->
                <div class="tree right" id="tree-right" onclick="showPopup('Female Name: Jane Smith')">
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                </div>

                <!-- Interactive Bench -->
                <div class="bench" id="bench-interactive" onclick="showPopup('Venue: Central Park\nTime: 6:00 PM\nDate: Dec 25, 2026')">
                    <div class="bench-wrap">
                        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                    </div>
                </div>

                <!-- Other elements (Swing, Lamp, Bin, Box) stay as they were -->
            </div>
        </div>
    </div>

    <script>
        function showPopup(message) {
            document.getElementById('popup-text').innerText = message;
            document.getElementById('custom-popup').style.display = 'flex';
        }

        function closePopup() {
            document.getElementById('custom-popup').style.display = 'none';
        }
    </script>
</body>
</html>
