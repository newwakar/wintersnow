<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magical Winter - Fixed Visuals</title>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.1.3/css/bootstrap.min.css'>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="background-linear"></div>

    <div id="custom-popup" class="popup-overlay" onclick="closePopup()">
        <div class="popup-content" onclick="event.stopPropagation()">
            <p id="popup-text"></p>
            <button onclick="closePopup()">Close</button>
        </div>
    </div>

    <div class="wrapper">
        <div class="winter-wrapper">
            <!-- Infinite Snow Layers -->
            <div class="snow-wrapper">
                <div class="snow-wrap">
                    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                </div>
            </div>

            <div class="winter-wrap">
                <div class="sun"></div>
                <div class="bottom-snow"></div>
                
                <div class="buildings">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>

                <!-- LEFT TREE -->
                <div class="tree tree-left interactive" onclick="showPopup('Male Name: Alexander')">
                    <span class="trunk"></span>
                    <span class="leaves"></span>
                    <span class="snow-top"></span>
                </div>

                <!-- RIGHT TREE -->
                <div class="tree tree-right interactive" onclick="showPopup('Female Name: Isabella')">
                    <span class="trunk"></span>
                    <span class="leaves"></span>
                    <span class="snow-top"></span>
                </div>

                <!-- BENCH -->
                <div class="bench interactive" onclick="showPopup('Venue: Winter Garden\nTime: 7:00 PM\nDate: Dec 24, 2026')">
                    <span class="back"></span>
                    <span class="seat"></span>
                    <span class="leg-l"></span>
                    <span class="leg-r"></span>
                    <span class="bench-snow"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showPopup(msg) {
            document.getElementById('popup-text').innerText = msg;
            document.getElementById('custom-popup').style.display = 'flex';
        }
        function closePopup() {
            document.getElementById('custom-popup').style.display = 'none';
        }
    </script>
</body>
</html>
