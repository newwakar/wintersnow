    <script>
      document.addEventListener('DOMContentLoaded', () => {
          const popup = document.getElementById('winter-popup');
          const clickables = document.querySelectorAll('.clickable');

          clickables.forEach(item => {
              item.addEventListener('click', (e) => {
                  const text = item.getAttribute('data-popup');
                  popup.innerText = text;
                  
                  // Position the popup near the click event position
                  popup.style.left = `${e.pageX - 30}px`;
                  popup.style.top = `${e.pageY - 55}px`;
                  
                  popup.classList.add('active');
                  
                  // Remove the active class after the animation completes
                  setTimeout(() => {
                      popup.classList.remove('active');
                  }, 2500);
              });
          });
      });
    </script>
    <script>
  const popup = document.getElementById('popup-container');
  const closeBtn = document.getElementById('close-btn');

  // Example: Show popup 2 seconds after page load
  setTimeout(() => {
    popup.classList.remove('popup-hidden');
  }, 2000);

  // Close popup when button is clicked
  closeBtn.addEventListener('click', () => {
    popup.classList.add('popup-hidden');
  });
</script>
