<button id="reset-popup-btn" style="position: fixed; bottom: 30px; left: 30px; z-index: 1000; padding: 10px 15px; background: #366a78; color: #fff; border: none; border-radius: 4px; cursor: pointer;">
  Reset Popup
</button>
    <script>
  const popup = document.getElementById('popup-container');
  
  const closeBtn = document.getElementById('close-btn');
  const dontShowBtn = document.getElementById('dont-show-btn'); // If you have a second button
  const resetBtn = document.getElementById('reset-popup-btn');

  // Check storage on page load
  if (localStorage.getItem('hideWinterPopup') === 'true') {
    popup.classList.add('popup-hidden');
  } else {
    popup.classList.remove('popup-hidden');
  }

  // Hide popup but remember choice
  if (dontShowBtn) {
    dontShowBtn.addEventListener('click', () => {
      localStorage.setItem('hideWinterPopup', 'true');
      popup.classList.add('popup-hidden');
    });
  }

  // Regular close (does not remember "don't show again")
  if (closeBtn) {
    closeBtn.addEventListener('click', () => {
      popup.classList.add('popup-hidden');
    });
  }

  // Reset button to make the popup show up again
  resetBtn.addEventListener('click', () => {
    localStorage.removeItem('hideWinterPopup');
    popup.classList.remove('popup-hidden');
    alert('Popup reset successfully!');
  });
</script>
