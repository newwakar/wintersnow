<button id="reset-popup-btn" style="position: fixed; bottom: 30px; left: 30px; z-index: 1000; padding: 10px 15px; background: #366a78; color: #fff; border: none; border-radius: 4px; cursor: pointer;">
  Reset Popup
</button>


    <script>
  document.addEventListener('DOMContentLoaded', () => {
    // 1. Popup Logic
    const popup = document.getElementById('welcome-popup');
    const closeBtn = document.getElementById('close-Btn');
    const dontShowCheckbox = document.getElementById('dont-show-again');

    // Check if the user opted to hide the popup in previous sessions
    if (localStorage.getItem('hideWelcomePopup') === 'true') {
      popup.classList.add('popup-hidden');
    }

    // Close button click action
    closeBtn.addEventListener('click', () => {
      // If "Don't show again" is checked, save it to storage
      if (dontShowCheckbox.checked) {
        localStorage.setItem('hideWelcomePopup', 'true');
      }
      popup.classList.add('popup-hidden');
    });

    // 2. Tree and Bench Interactivity
    const leftTree = document.querySelector('.tree:not(.right)');
    const rightTree = document.querySelector('.tree.right');
    const bench = document.querySelector('.bench');

    // Left Tree Click Event
    if (leftTree) {
      leftTree.addEventListener('click', () => {
        console.log('Left tree clicked!');
        alert('You clicked the Left Tree!');
      });
    }

    // Right Tree Click Event
    if (rightTree) {
      rightTree.addEventListener('click', () => {
        console.log('Right tree clicked!');
        alert('You clicked the Right Tree!');
      });
    }

    // Bench Click Event
    if (bench) {
      bench.addEventListener('click', () => {
        console.log('Bench clicked!');
        alert('You clicked the bench!');
      });
    }
  });
</script>
