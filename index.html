<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magical Winter - Interactive</title>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.1.3/css/bootstrap.min.css'>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="background-linear"></div>

    <!-- Popup Container -->
    <div id="custom-popup" class="popup-overlay" onclick="closePopup()">
        <div class="popup-content" onclick="event.stopPropagation()">
            <p id="popup-text"></p>
            <button onclick="closePopup()">Close</button>
        </div>
    </div>

    <div class="wrapper">
        <div class="winter-wrapper">
            <!-- Falling Snow -->
            <div class="snow-wrapper big">
                <div class="snow-wrap"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
            </div>

            <div class="winter-wrap">
                <div class="sun"></div>
                <div class="bottom-snow"><span></span></div>
                <div class="middle-snow"></div>
                
                <!-- City Skyline -->
                <div class="buildings">
                    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                </div>

                <!-- LEFT TREE (Male Name) -->
                <div class="tree interactive" onclick="showPopup('Male Name: Alexander')">
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                </div>

                <!-- RIGHT TREE (Female Name) -->
                <div class="tree right interactive" onclick="showPopup('Female Name: Isabella')">
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                </div>

                <!-- BENCH (Venue Details) -->
                <div class="bench interactive" onclick="showPopup('Venue: Winter Garden\nTime: 7:00 PM\nDate: Dec 24, 2026')">
                    <div class="bench-wrap">
                        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                    </div>
                </div>

                <div class="lamp"><div class="lamp-wrap"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div>
            </div>
        </div>
    </div>

    <script>
        function showPopup(message) {
            document.getElementById('popup-text').innerText = message;
            document.getElementById('custom-popup').style.display = 'flex';
        }
        function closePopup() {
            document.getElementById('custom-popup').style.display = 'none';
        }
    </script>
</body>
</html>
