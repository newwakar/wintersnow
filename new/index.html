  <script>
    // Pop-up Visibility Logic
    document.addEventListener("DOMContentLoaded", function() {
      const popup = document.getElementById('welcome-popup');
      const gotItBtn = document.getElementById('got-it-btn');
      const dontShowBtn = document.getElementById('dont-show-btn');
      const resetBtn = document.getElementById('reset-popup-btn');

      // Check if user clicked 'don't show again'
      if (localStorage.getItem('hideWelcomePopup') === 'true') {
        popup.style.display = 'none';
      } else {
        popup.style.display = 'flex';
      }

      gotItBtn.addEventListener('click', function() {
        popup.style.display = 'none';
      });

      dontShowBtn.addEventListener('click', function() {
        localStorage.setItem('hideWelcomePopup', 'true');
        popup.style.display = 'none';
      });

      resetBtn.addEventListener('click', function() {
        localStorage.removeItem('hideWelcomePopup');
        popup.style.display = 'flex';
      });
    });
  </script>
